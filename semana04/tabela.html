<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WDD 131 – Atividade de Aprendizagem: Tabelas HTML</title>
  <meta name="description" content="Página de exemplo da atividade de aprendizagem sobre tabelas HTML.">
  <meta name="author" content="Sofia de S. Lazarini">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="estilos/tabela.css">
</head>
<body>
  <header>
    <h1>Comparação de Recursos da Conta</h1>
  </header>

  <main>
    <table>
      <caption>Tabela 1: Comparação de Recursos da Conta</caption>
      <thead>
        <tr>
          <th colspan="4" class="titulo-empresa">ACME Wildwest Services</th>
        </tr>
        <tr>
          <th class="canto"></th>
          <th>Básico</th>
          <th>Premium</th>
          <th>Deluxe</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <th scope="row">Recurso 1</th>
          <td>✔️</td>
          <td>✔️</td>
          <td>✔️</td>
        </tr>
        <tr>
          <th scope="row">Recurso 2</th>
          <td>❌</td>
          <td>✔️</td>
          <td>✔️</td>
        </tr>
        <tr>
          <th scope="row">Recurso 3</th>
          <td>❌</td>
          <td>❌</td>
          <td>✔️</td>
        </tr>
      </tbody>
    </table>
  </main>

  <footer>
    <p>Sofia de S. Lazarini</p>
  </footer>
</body>
</html>
