<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WDD 131 – Atividade de Aprendizagem: Carregamento Lento de Imagens</title>
  <meta name="description" content="Página de exemplo da atividade de aprendizagem sobre carregamento lento (lazy loading) nativo de imagens.">
  <meta name="author" content="Sofia de S. Lazarini">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="estilos/carregamentolento.css">
  <script src="scripts/carregamentolento.js" defer></script>
</head>
<body>

  <main>
    <h1>Carregamento Lento de Imagens</h1>

    <img src="https://picsum.photos/seed/lento1/400/600" alt="Paisagem de montanhas usada para demonstrar o carregamento lento" width="400" height="600" loading="lazy">

    <img src="https://picsum.photos/seed/lento2/400/600" alt="Paisagem de floresta usada para demonstrar o carregamento lento" width="400" height="600" loading="lazy">

    <img src="https://picsum.photos/seed/lento3/400/600" alt="Paisagem urbana usada para demonstrar o carregamento lento" width="400" height="600" loading="lazy">

    <img src="https://picsum.photos/seed/lento4/400/600" alt="Paisagem de praia usada para demonstrar o carregamento lento" width="400" height="600" loading="lazy">

    <img src="https://picsum.photos/seed/lento5/400/600" alt="Paisagem de deserto usada para demonstrar o carregamento lento" width="400" height="600" loading="lazy">

    <img src="https://picsum.photos/seed/lento6/400/600" alt="Paisagem noturna usada para demonstrar o carregamento lento" width="400" height="600" loading="lazy">
  </main>

  <footer>
    <p>Sofia de S. Lazarini</p>
    <p id="ultimaModificacao"></p>
  </footer>

</body>
</html>
